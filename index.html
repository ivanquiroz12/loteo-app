<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sistema de Loteo</title>
<style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --border: #e2e0d9; --border-strong: #c8c5bc;
      --text: #1a1916; --text-muted: #706e67; --text-hint: #a09e97;
      --success-bg: #eaf3de; --success-text: #3b6d11;
      --danger-bg: #fcebeb; --danger-text: #a32d2d;
      --warn-bg: #faeeda; --warn-text: #854f0b;
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 14px;
      --font: 'DM Sans', system-ui, sans-serif; --mono: 'DM Mono', 'Fira Mono', monospace;
    }
    body { background: var(--bg); font-family: var(--font); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 860px; margin: 0 auto; }
    .app-header { margin-bottom: 1.5rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .app-header h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.02em; }
    .app-header p { font-size: 13px; color: var(--text-muted); margin-top: 3px; }
    .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; }
    .tab { padding: 9px 13px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; background: none; border-top: none; border-left: none; border-right: none; white-space: nowrap; font-family: var(--font); transition: color .15s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom: 2px solid var(--text); }
    .nivel-tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 999px; font-weight: 600; margin-right: 4px; vertical-align: middle; }
    .n1 { background: #c0dd97; color: #3b6d11; }
    .n2 { background: #b5d4f4; color: #185fa5; }
    .n3 { background: #f5c4b3; color: #993c1d; }
    .n4 { background: #e1d5f5; color: #5a3fa0; }
    .counter-badge { background: var(--bg); border: 1px solid var(--border); border-radius: 999px; padding: 1px 7px; font-size: 11px; color: var(--text-muted); margin-left: 2px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.3rem; margin-bottom: 1rem; }
    .card-table { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 1rem; }
    .sec-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--text-muted); }
    input, select { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; font-family: var(--font); color: var(--text); outline: none; transition: border-color .15s; width: 100%; }
    input:focus, select:focus { border-color: var(--border-strong); }
    input.err { border-color: #f09595; background: var(--danger-bg); }
    .code-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 0.9rem 1.1rem; display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
    .code-lbl { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; }
    .code-val { font-family: var(--mono); font-size: 19px; font-weight: 500; letter-spacing: 0.05em; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn-p { background: var(--text); color: #fff; border: none; border-radius: var(--radius-md); padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer; flex: 1; font-family: var(--font); transition: opacity .15s; }
    .btn-p:hover { opacity: 0.85; }
    .btn-p:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-s { background: transparent; border: 1px solid var(--border-strong); border-radius: var(--radius-md); padding: 9px 16px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--text); flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: var(--font); transition: background .15s; }
    .btn-s:hover { background: var(--bg); }
    .btn-s:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-sm { background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 4px 9px; font-size: 11px; color: var(--text-muted); cursor: pointer; font-family: var(--font); white-space: nowrap; }
    .btn-sm:hover { background: var(--bg); }
    .btn-danger { border-color: #f09595; color: var(--danger-text); }
    .btn-danger:hover { background: var(--danger-bg); }
    .btn-outline { background: transparent; border: 1px solid var(--border-strong); border-radius: var(--radius-md); padding: 7px 14px; font-size: 12px; font-weight: 500; cursor: pointer; color: var(--text); display: inline-flex; align-items: center; gap: 6px; font-family: var(--font); transition: background .15s; }
    .btn-outline:hover { background: var(--surface); }
    .flash { border-radius: var(--radius-sm); padding: 9px 13px; font-size: 13px; display: none; margin-top: 10px; background: var(--success-bg); color: var(--success-text); }
    .flash-warn { background: var(--warn-bg); color: var(--warn-text); }
    .flash-err { background: var(--danger-bg); color: var(--danger-text); }
    .htable { width: 100%; border-collapse: collapse; font-size: 12px; }
    .htable th { text-align: left; padding: 8px 11px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    .htable td { padding: 8px 11px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .htable tr:last-child td { border-bottom: none; }
    .htable tr:hover td { background: var(--bg); }
    .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
    .badge-warn { background: var(--warn-bg); color: var(--warn-text); }
    .badge-ok { background: var(--success-bg); color: var(--success-text); }
    .badge-empty { background: var(--danger-bg); color: var(--danger-text); }
    .empty { text-align: center; padding: 2.5rem; color: var(--text-hint); font-size: 13px; }
    .td-actions { display: flex; gap: 5px; justify-content: center; }
    .insumo-row { display: grid; grid-template-columns: 1fr 1fr 120px; gap: 8px; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .insumo-row:last-child { border-bottom: none; }
    .insumo-label { font-size: 13px; }
    .stock-pill { font-size: 11px; padding: 2px 8px; border-radius: 999px; text-align: center; }
    .traza-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; margin-top: 8px; font-size: 12px; color: var(--text-muted); line-height: 2; }
    .traza-box .mono { font-family: var(--mono); color: var(--text); font-size: 12px; }
    /* Inventario panel */
    .inv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 1rem; }
    .inv-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px; }
    .inv-card.warn { border-color: #ef9f27; }
    .inv-card.empty { border-color: #f09595; }
    .inv-cat { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
    .inv-name { font-size: 13px; font-weight: 500; margin-bottom: 8px; }
    .inv-kg { font-family: var(--mono); font-size: 20px; font-weight: 500; }
    .inv-kg.warn { color: var(--warn-text); }
    .inv-kg.empty { color: var(--danger-text); }
    .inv-detail { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .inv-bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .inv-bar-fill { height: 100%; background: #3b6d11; border-radius: 2px; transition: width .3s; }
    .inv-bar-fill.warn { background: #ef9f27; }
    .inv-bar-fill.empty { background: #e24b4a; }
    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: none; align-items: center; justify-content: center; z-index: 100; padding: 1rem; }
    .modal-bg.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 540px; border: 1px solid var(--border); max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 15px; font-weight: 600; margin-bottom: 1.2rem; }
    .modal-footer { display: flex; gap: 8px; margin-top: 1.2rem; justify-content: flex-end; }
    .modal-footer .btn-p, .modal-footer .btn-s { flex: none; padding: 8px 20px; }
    #etiqueta-frame { display: none; }
    #bitacora-print { display: none; }
    .cfg-row { display:flex; align-items:center; gap:8px; padding:7px 0; border-bottom:1px solid var(--border); }
    .cfg-row:last-child { border-bottom:none; }
    .cfg-row-label { flex:1; font-size:13px; }
    .cfg-row-code { font-family:var(--mono); font-size:11px; color:var(--text-muted); min-width:50px; }
    .cfg-tag { display:inline-flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:3px 8px; font-size:12px; margin:3px; }
    .cfg-tag button { background:none; border:none; cursor:pointer; color:var(--text-muted); font-size:13px; line-height:1; padding:0 2px; }
    .cfg-tag button:hover { color:var(--danger-text); }
    @media (max-width: 580px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid-3 { grid-template-columns: 1fr 1fr; }
      .form-group.full { grid-column: 1; }
      .btn-row { flex-direction: column; }
    }
  
/* ══ MÓDULOS ══════════════════════════════════════════ */
:root {
  --jh:        #C84B2F; --jh-bg:     #FDF0ED; --jh-border: #F5C4B8;
  --bh-emp:    #2E6FA3; --bh-emp-bg: #EDF4FB; --bh-emp-border: #B8D8F5;
  --bh-fri:    #3A7D44; --bh-fri-bg: #EDF6EF; --bh-fri-border: #B8E0BE;
  --mz:        #7B4EA6; --mz-bg:     #F5EDFB; --mz-border:     #DDB8F5;
}

/* Header modular */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 1.25rem; height: 52px; position: sticky; top: 0; z-index: 200;
  gap: 12px;
}
.header-left  { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.header-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.header-center { display:flex; align-items:center; gap:2px; overflow-x:auto; flex:1; justify-content:center; }
.header-logo { font-family:var(--mono); font-size:13px; font-weight:600; letter-spacing:.05em; }
.header-sep  { color:var(--text-hint); }
.header-modulo { font-size:12px; color:var(--text-muted); white-space:nowrap; }

/* Nav módulos */
.mod-btn {
  display:flex; align-items:center; gap:7px; padding:6px 14px;
  border:1px solid transparent; border-radius:var(--radius-md);
  background:none; cursor:pointer; font-family:var(--font); font-size:12px;
  font-weight:500; color:var(--text-muted); white-space:nowrap;
  transition:all .12s;
}
.mod-btn:hover { background:var(--surface2); color:var(--text); }
.mod-btn.active { color:var(--text); font-weight:600; }
.mod-btn.active.jh     { background:var(--jh-bg);     color:var(--jh);     border-color:var(--jh-border); }
.mod-btn.active.bh-emp { background:var(--bh-emp-bg); color:var(--bh-emp); border-color:var(--bh-emp-border); }
.mod-btn.active.bh-fri { background:var(--bh-fri-bg); color:var(--bh-fri); border-color:var(--bh-fri-border); }
.mod-btn.active.mz     { background:var(--mz-bg);     color:var(--mz);     border-color:var(--mz-border); }
.mod-pill {
  font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px;
  font-family:var(--mono);
}
.jh     .mod-pill { background:var(--jh);     color:#fff; }
.bh-emp .mod-pill { background:var(--bh-emp); color:#fff; }
.bh-fri .mod-pill { background:var(--bh-fri); color:#fff; }
.mz     .mod-pill { background:var(--mz);     color:#fff; }

/* Subtabs */
.subtabs-bar {
  background:var(--bg); border-bottom:1px solid var(--border);
  display:flex; gap:2px; padding:8px 1.5rem 0; overflow-x:auto;
}
.subtab-btn {
  display:flex; align-items:center; gap:6px;
  padding:7px 14px; border:1px solid transparent;
  border-radius:var(--radius-md) var(--radius-md) 0 0;
  border-bottom:none; background:none; cursor:pointer;
  font-family:var(--font); font-size:12px; font-weight:500;
  color:var(--text-muted); white-space:nowrap; transition:all .12s;
  margin-bottom:-1px;
}
.subtab-btn:hover { background:var(--surface2); color:var(--text); }
.subtab-btn.active {
  background:var(--surface); color:var(--text);
  border-color:var(--border); padding-bottom:8px;
}
.nivel-chip {
  font-family:var(--mono); font-size:9px; font-weight:700;
  padding:1px 5px; border-radius:3px;
}
.nc-n1 { background:#ddeeff; color:#1a5fa8; }
.nc-n2 { background:#e8f5e0; color:#2e7031; }
.nc-n3 { background:#fff0e0; color:#a85a1a; }
.nc-n4 { background:#f0e8ff; color:#6a1aaa; }

/* App main */
.app-main { padding:1.25rem; max-width:1400px; margin:0 auto; }

/* Login */
#login-screen {
  display:flex; align-items:center; justify-content:center;
  min-height:100vh; background:var(--bg); padding:1rem;
}
.login-card {
  background:var(--surface); border:1px solid var(--border);
  border-radius:var(--radius-lg); padding:2rem 1.75rem;
  width:100%; max-width:380px; box-shadow:0 4px 20px rgba(0,0,0,.08);
  display:flex; flex-direction:column; gap:14px;
}
.login-logo { text-align:center; margin-bottom:.5rem; }
.login-logo-mark {
  width:44px; height:44px; background:var(--text); color:var(--surface);
  border-radius:12px; font-family:var(--mono); font-size:20px; font-weight:700;
  display:inline-flex; align-items:center; justify-content:center; margin-bottom:10px;
}
.login-logo h1 { font-size:17px; font-weight:600; letter-spacing:-.02em; }
.login-logo p  { font-size:12px; color:var(--text-muted); margin-top:3px; }
.error-box { background:var(--danger-bg); color:var(--danger-text); border-radius:var(--radius-sm); padding:8px 12px; font-size:13px; }
.btn-salir { background:none; border:1px solid var(--border); border-radius:var(--radius-sm); padding:4px 10px; font-size:11px; cursor:pointer; font-family:var(--font); color:var(--text-muted); }
.btn-salir:hover { color:var(--text); }
.user-pill { display:flex; align-items:center; gap:8px; }
.sb-status { font-size:11px; color:var(--text-muted); }

/* Banner corte */
.corte-banner {
  background:var(--text); color:var(--surface); border-radius:var(--radius-lg);
  padding:.875rem 1.25rem; margin-bottom:1rem;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.corte-banner h3 { font-size:13px; font-weight:600; }
.corte-banner p  { font-size:11px; opacity:.65; margin-top:2px; }
.btn-corte {
  background:var(--surface); color:var(--text); border:none;
  padding:7px 14px; border-radius:var(--radius-sm); font-size:12px;
  font-weight:600; cursor:pointer; white-space:nowrap; font-family:var(--font);
}

/* Transfer JH ref */
.jh-ref-badge {
  display:inline-flex; align-items:center; gap:5px;
  background:var(--jh-bg); color:var(--jh); border:1px solid var(--jh-border);
  border-radius:var(--radius-sm); padding:2px 8px; font-family:var(--mono); font-size:11px;
}
.transfer-row {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  background:#FFF8E0; border:1px solid #F5DFA0;
  border-radius:var(--radius-sm); padding:8px 12px; margin-bottom:8px; font-size:12px;
}

/* Módulo resumen header */
.mod-resumen {
  border-radius:var(--radius-lg); padding:.875rem 1.25rem;
  margin-bottom:1rem; border:1px solid;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
}
.mod-resumen.jh     { background:var(--jh-bg);     border-color:var(--jh-border);     }
.mod-resumen.bh-emp { background:var(--bh-emp-bg); border-color:var(--bh-emp-border); }
.mod-resumen.bh-fri { background:var(--bh-fri-bg); border-color:var(--bh-fri-border); }
.mod-resumen.mz     { background:var(--mz-bg);     border-color:var(--mz-border);     }
.mod-resumen-title  { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; }
.mod-resumen.jh     .mod-resumen-title { color:var(--jh);     }
.mod-resumen.bh-emp .mod-resumen-title { color:var(--bh-emp); }
.mod-resumen.bh-fri .mod-resumen-title { color:var(--bh-fri); }
.mod-resumen.mz     .mod-resumen-title { color:var(--mz);     }
.resumen-stats { display:flex; gap:1.5rem; flex-wrap:wrap; }
.resumen-stat .val { font-family:var(--mono); font-size:22px; font-weight:600; line-height:1; }
.resumen-stat .lbl { font-size:11px; color:var(--text-muted); margin-top:2px; }

/* Semanas historial */
.semana-card { border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; margin-bottom:8px; }
.semana-hdr  { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; background:var(--surface2); cursor:pointer; }
.semana-hdr h4 { font-size:13px; font-weight:600; }
.semana-hdr p  { font-size:11px; color:var(--text-muted); }
.semana-body { padding:12px 14px; background:var(--surface); display:none; }
.semana-body.open { display:block; }

/* Card utils */
.card-header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
.card-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); }
.table-toolbar { display:flex; align-items:center; justify-content:space-between; padding:8px 11px; border-bottom:1px solid var(--border); background:var(--bg); }
.table-info { font-size:12px; color:var(--text-muted); }
.toggle-label { display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer; color:var(--text-muted); }
.card-table { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; margin-bottom:1rem; box-shadow:var(--shadow); }
.section-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); margin-bottom:8px; }
.mono { font-family:var(--mono); font-size:12px; }
.btn-danger-outline { color:var(--danger-text); border-color:#f5b8b3; }
.cfg-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:1rem; }
.cfg-section-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cfg-section-title { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-muted); }
.nivel-tag { font-family:var(--mono); font-size:9px; font-weight:700; padding:1px 5px; border-radius:3px; }

</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">L</div>
      <h1>Sistema de Loteo</h1>
      <p>Control de trazabilidad y producción</p>
    </div>
    <div class="form-group"><label>Usuario</label>
      <input id="login-usuario" type="text" placeholder="tu.usuario" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()"/>
    </div>
    <div class="form-group"><label>Contraseña</label>
      <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')iniciarSesion()"/>
    </div>
    <div id="login-error" class="error-box" style="display:none"></div>
    <button class="btn-p" id="login-btn" onclick="iniciarSesion()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app-container" style="display:none">

  <!-- HEADER -->
  <header class="app-header no-print">
    <div class="header-left">
      <span class="header-logo">LOTEO</span>
      <span class="header-sep">·</span>
      <span id="header-modulo-label" class="header-modulo"></span>
    </div>
    <div class="header-center" id="modulos-nav"></div>
    <div class="header-right">
      <span id="sb-status" class="sb-status">◌ Conectando...</span>
      <span class="user-pill">
        <span id="user-info"></span>
        <button class="btn-salir" onclick="cerrarSesion()">Salir</button>
      </span>
    </div>
  </header>

  <!-- SUBTABS -->

async function sbFetch(table,method='GET',body=null,query='',upsert=false){
  const url=SB_URL+'/rest/v1/'+table+(query?'?'+query:'');
  const h={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','X-Client-Info':'loteo-modular/2.0'};
  if(method==='POST'&&upsert)h['Prefer']='resolution=merge-duplicates,return=minimal';
  else if(method==='POST'||method==='PATCH')h['Prefer']='return=minimal';
  const opts={method,headers:h};
  if(body)opts.body=JSON.stringify(body);
  try{
    const res=await fetch(url,opts);
    if(!res.ok){const e=await res.text();throw new Error('HTTP '+res.status+': '+e);}
    if(res.status===204||res.status===201)return null;
    const ct=res.headers.get('content-type')||'';
    return ct.includes('application/json')?await res.json():null;
  }catch(e){
    if(e.message.startsWith('HTTP'))throw e;
    throw new Error('Sin conexión: '+e.message);
  }
}

// ── AUTENTICACIÓN ──────────────────────────────────────────
async function iniciarSesion(){
  const usuario=(document.getElementById('login-usuario')?.value||'').trim();
  const password=document.getElementById('login-password')?.value||'';
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-error');
  if(!usuario||!password){err.textContent='Ingresa usuario y contraseña.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Verificando...';err.style.display='none';
  try{
    const rows=await sbFetch('usuarios','GET',null,'usuario=eq.'+encodeURIComponent(usuario)+'&activo=eq.true&select=*');
    if(!rows||!rows.length)throw new Error('Usuario no encontrado');
    const u=rows[0];
    if(u.password_hash!==btoa(password))throw new Error('Contraseña incorrecta');
    sesion={usuario:u.usuario,nombre:u.nombre,rol:u.rol,estKey:u.establecimiento,modulos:u.modulos||[],permisos:u.permisos||null};
    localStorage.setItem('loteo_sesion_v2',JSON.stringify(sesion));
    mostrarApp();
    registrarAuditoria('LOGIN','usuarios',sesion.usuario,'Inicio de sesión: '+sesion.nombre);
  }catch(e){
    err.textContent=e.message==='Usuario no encontrado'||e.message==='Contraseña incorrecta'?'Usuario o contraseña incorrectos.':'Error de conexión. Intenta de nuevo.';
    err.style.display='block';
    btn.disabled=false;btn.textContent='Entrar';
  }
}
function cerrarSesion(){
  if(sesion)registrarAuditoria('LOGOUT','usuarios',sesion.usuario,'Cierre de sesión');
  sesion=null;
  localStorage.removeItem('loteo_sesion_v2');
  document.getElementById('app-container').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-usuario').value='';
  document.getElementById('login-password').value='';
}
function recuperarSesion(){
  try{
    var raw=localStorage.getItem('loteo_sesion_v2');
    if(!raw)return false;
    var s=JSON.parse(raw);
    if(s&&s.usuario&&s.rol&&ROLES[s.rol]){
      sesion=s;
      return true;
    }
  }catch(e){console.warn('Error recuperando sesion:',e);}
  return false;
}

function getModulosUsuario(){
  const rol=ROLES[sesion?.rol];
  if(rol?.allModulos)return Object.keys(MODULOS_CONFIG);
  return sesion?.modulos||[];
}
function getTabsUsuario(mod){
  const cfg=MODULOS_CONFIG[mod];
  if(!cfg)return[];
  if(sesion?.permisos?.length){
    return cfg.tabs.filter(t=>sesion.permisos.includes(t)||t==='resumen');
  }
  const rol=ROLES[sesion?.rol];
  if(rol?.canConfig)return cfg.tabs;
  return cfg.tabs.filter(t=>t!=='cfg');
}
function puedeEliminar(){return ROLES[sesion?.rol]?.canDelete||false;}
function puedeConfig(){return ROLES[sesion?.rol]?.canConfig||false;}
function getEstabFiltro(){if(!sesion)return null;if(ROLES[sesion.rol]?.allEstabs)return null;return sesion.estKey;}

function mostrarApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-container').style.display='block';
  // Info usuario
  document.getElementById('user-info').textContent=sesion.nombre+' · '+ROLES_LABELS[sesion.rol];
  // Construir nav de módulos
  renderModulosNav();
  // Ir al primer módulo

  if(mods.length)switchModulo(mods[0]);

// ── NAVEGACIÓN MODULAR ─────────────────────────────────────
function renderModulosNav(){
  var mods=getModulosUsuario();
  var nav=document.getElementById('modulos-nav');
  if(!nav)return;
  if(!mods.length){
    nav.innerHTML='<span style="font-size:12px;color:var(--text-muted);padding:0 12px">Sin modulos asignados.</span>';
    return;
  }
  var btns='';
  mods.forEach(function(mod){
    var cfg=MODULOS_CONFIG[mod];
    if(!cfg)return;
    var parts=cfg.label.split('—');
    var labelCorto=parts.length>1?parts[1].trim():cfg.label;
    btns+='<button class="mod-btn '+cfg.color+'" data-mod="'+mod+'">'
      +'<span class="mod-pill">'+cfg.est+'</span>'+labelCorto+'</button>';

function switchModulo(mod){
  moduloActual=mod;
  const cfg=MODULOS_CONFIG[mod];
  document.getElementById('header-modulo-label').textContent=cfg.label;
  // Activar btn
  document.querySelectorAll('.mod-btn').forEach(b=>b.classList.toggle('active',b.dataset.mod===mod));

function renderSubtabs(mod){
  const cfg=MODULOS_CONFIG[mod];

    const nivel=cfg.tabNiveles?.[t];

      ${nivel?`<span class="nivel-chip nc-${nivel.toLowerCase().replace('-','')}">${nivel}</span>`:''}
      ${cfg.tabLabels[t]||t}

function switchTab(tab){
  console.log('[switchTab]', tab);
  tabActual=tab;
  document.querySelectorAll('.subtab-btn').forEach(b=>b.classList.toggle('active',b.dataset.subtab===tab));
  renderTab(tab);

// ── FILTRO POR MÓDULO Y ESTABLECIMIENTO ────────────────────
function lotesDelModulo(arr,mod){
  return arr.filter(l=>(!l.modulo||l.modulo===mod||l.modulo===(mod||moduloActual)));
}
function filtrarEstab(arr){
  const est=getEstabFiltro();
  return est?arr.filter(l=>l.est===est):arr;
}
function loteActivoMP(l){return!l.archivado&&kgDisponible(l)>0;}
function loteActivoBE(l){return!l.archivado&&!bolsaUsada(l.codigo);}
function bolsaUsada(cod){return lotesPT.some(l=>l.loteBE&&l.loteBE.codigo===cod);}
function kgUsadoEnBolsas(cod){return round2(lotesBE.reduce((s,l)=>{return s+(l.lotesUsados||[]).reduce((ss,u)=>ss+(u.lote===cod?u.kg||0:0),0);},0));}
function kgUsadoEnPT(cod){return round2(lotesPT.reduce((s,l)=>s+(l.loteMP&&l.loteMP.codigo===cod?l.kgUsadoMP||0:0),0));}
function kgDisponible(lote){return round2((lote.kg||0)-kgUsadoEnBolsas(lote.codigo)-kgUsadoEnPT(lote.codigo));}
function stockDispParaEspecia(nombre){return round2(lotesMP.filter(l=>mismoNombre(l.subinsumo,nombre)).reduce((s,l)=>s+kgDisponible(l),0));}

// ── RENDER TABS ────────────────────────────────────────────
function renderTab(tab){
  console.log('[renderTab]', tab);

  if(tab==='n1')     return void(el.innerHTML=renderFormularioMP()+renderHistorialMP());

  if(tab==='n3')     return void(el.innerHTML=renderFormularioPT()+renderHistorialPT());
  if(tab==='n4')     return void(el.innerHTML=renderFormularioEP()+renderHistorialEP());
  if(tab==='n4granel')return void(el.innerHTML=renderFormularioEPGranel()+renderHistorialEPGranel());
  if(tab==='inv')    return void(el.innerHTML=renderInventario());
  if(tab==='traza')  return void(el.innerHTML=renderTrazabilidad());

function getSemanaActual(){
  const d=new Date();
  const startOfYear=new Date(d.getFullYear(),0,1);
  const week=Math.ceil(((d-startOfYear)/86400000+startOfYear.getDay()+1)/7);
  return d.getFullYear()+'-W'+String(week).padStart(2,'0');
}
function renderResumenTabla(){
  const hoy=today();
  const todos=[
    ...filtrarEstab(lotesDelModulo(lotesMP,moduloActual)).filter(l=>l.fecha===hoy&&!l.archivado).map(l=>({...l,_tipo:'N1'})),

}

function updateSubins(){
  const ins=v('mp-ins');

function calcMP(){
  const est=v('mp-est'),fecha=v('mp-fecha'),ins=v('mp-ins'),subins=v('mp-subins'),kg=parseFloat(v('mp-kg'));
  const box=document.getElementById('mp-codebox');
  if(!est||!fecha||!ins||!subins||!kg){box.style.display='none';setBtn('mp',false);return;}
  const k=ck(est,ins,fecha);
  let n=peek(k),cod=est+'-'+fc(fecha)+'-'+ins+pad(n);
  while(lotesMP.find(l=>l.codigo===cod)){n++;cod=est+'-'+fc(fecha)+'-'+ins+pad(n);}
  document.getElementById('mp-codigo').textContent=cod;
  box.style.display='flex';setBtn('mp',true);
}
async function registrarMP(imp){
  let est=v('mp-est');if(sesion&&getEstabFiltro())est=sesion.estKey;
  const fecha=v('mp-fecha'),ins=v('mp-ins'),subins=v('mp-subins');
  const kg=parseFloat(v('mp-kg')),minStock=getMinStock(subins)||0;
  if(!est||!fecha||!ins||!subins||!kg)return;
  const k=ck(est,ins,fecha);
  let n=next(k),codigo=est+'-'+fc(fecha)+'-'+ins+pad(n);
  while(lotesMP.find(l=>l.codigo===codigo)){n=next(k);codigo=est+'-'+fc(fecha)+'-'+ins+pad(n);}
  const unidad=getSubins(ins,subins).unidad||'kg';
  const l={codigo,modulo:moduloActual,est,establecimiento:ESTABLECIMIENTOS[est],fecha,ins,insumo:INSUMOS[ins],subinsumo:subins,kg,unidad,minStock,consec:n,archivado:false,nivel:1,ts:Date.now()};
  lotesMP.unshift(l);guardarLocal();
  await sbGuardarLote('lotes_mp',loteToRowMP(l));
  await sbActualizarConsec(k,n);
  registrarAuditoria('REGISTRO','lotes_mp',codigo,'Entrada: '+subins+' '+kg+' '+unidad);

}

function calcPT(){
  const prod=v('pt-prod'),fecha=v('pt-fecha'),kg=parseFloat(v('pt-kg'));
  const mp=v('pt-lote-mp'),be=v('pt-lote-be'),kgMP=parseFloat(v('pt-kg-mp'));
  const box=document.getElementById('pt-codebox');
  const alertDiv=document.getElementById('pt-stock-alert');
  if(!prod||!fecha){box.style.display='none';setBtn('pt',false);return;}
  actualizarSelectorCarnico(prod);
  document.getElementById('pt-codigo').textContent='PT-'+fc(fecha)+'-'+prod+'-'+pad(peek(ck('PT',prod,fecha)));
  box.style.display='flex';
  let errores=[];
  if(mp){
    const loteMP=lotesMP.find(l=>l.codigo===mp);
    const permitidos=CARNICOS_POR_PROD[prod]||[];
    if(loteMP&&permitidos.length&&!permitidos.includes(loteMP.subinsumo))
      errores.push('El cárnico <strong>'+loteMP.subinsumo+'</strong> no está permitido para '+PRODUCTOS[prod]+'. Permitidos: '+permitidos.join(', '));
    if(loteMP&&kgMP){
      const disp=kgDisponible(loteMP);
      if(kgMP>disp)errores.push('Stock insuficiente — necesitas '+kgMP+' kg pero hay '+disp+' kg disponibles en '+mp);
    }
  }
  if(be&&bolsaUsada(be))errores.push('La bolsa <strong>'+be+'</strong> ya fue utilizada en otro proceso');
  if(errores.length){
    alertDiv.style.display='block';
    alertDiv.innerHTML='<div style="background:var(--danger-bg);color:var(--danger-text);border-radius:var(--radius-sm);padding:9px 13px;font-size:12px">'+errores.map(e=>'<div>⚠ '+e+'</div>').join('')+'</div>';
    setBtn('pt',false);return;
  }
  alertDiv.style.display='none';
  setBtn('pt',!!(prod&&fecha&&kg&&kgMP&&mp&&be));
}

function renderInventario(){
  const lotes=filtrarEstab(lotesDelModulo(lotesMP,moduloActual)).filter(l=>!l.archivado);
  const grupos={};
  lotes.forEach(l=>{

  });
  return`<div class="card">
    <div class="card-header-row"><div class="card-title">Inventario actual — ${MODULOS_CONFIG[moduloActual].label}</div></div>
    ${Object.entries(grupos).map(([ins,items])=>{
      const[ibg,itc]=INSUMO_COLOR[ins]||['#D3D1C7','#5F5E5A'];
      return`<div style="margin-bottom:1.25rem">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">
          <span class="badge" style="background:${ibg};color:${itc}">${INSUMOS[ins]||ins}</span>
        </div>
        <table class="htable"><thead><tr>
          <th>Descripción</th><th>Lotes activos</th><th>Stock total disp.</th><th>Estado</th>
        </tr></thead><tbody>
        ${agruparPorSubinsumo(items).map(([sub,lotesSub])=>{
          const dispTotal=round2(lotesSub.reduce((s,l)=>s+kgDisponible(l),0));
          const unidad=lotesSub[0]?.unidad||'kg';
          const minSt=getMinStock(sub);
          const stCls=dispTotal<=0?'badge-empty':minSt&&dispTotal<=minSt?'badge-warn':'badge-ok';
          const stTxt=dispTotal<=0?'Sin stock':minSt&&dispTotal<=minSt?'Stock bajo':'OK';
          return`<tr>
            <td>${sub}</td>
            <td style="font-size:12px;color:var(--text-muted)">${lotesSub.length} lote(s)</td>
            <td class="mono" style="font-weight:500">${dispTotal} ${unidad}</td>
            <td><span class="badge ${stCls}">${stTxt}</span></td>
          </tr>`;
        }).join('')}
        </tbody></table>
      </div>`;
    }).join('')}
    ${Object.keys(grupos).length===0?'<div class="empty">Sin materia prima registrada en este módulo</div>':''}
  </div>`;
}
function agruparPorSubinsumo(lotes){
  const m={};
  lotes.filter(l=>kgDisponible(l)>0).forEach(l=>{
    const k=l.subinsumo||l.insumo;
    if(!m[k])m[k]=[];
    m[k].push(l);
  });
  return Object.entries(m);
}

// ── BORRAR LOTES ───────────────────────────────────────────
function confirmarBorrar(nivel,idx){
  const lote=nivel==='mp'?lotesMP[idx]:nivel==='be'?lotesBE[idx]:nivel==='pt'?lotesPT[idx]:lotesEP[idx];
  if(!lote)return;
  abrirModalCfg(
    'Borrar lote',
    `<div style="background:var(--danger-bg);border-radius:var(--radius-sm);padding:12px 14px">
      <p style="font-size:13px;color:var(--danger-text);font-weight:500;margin-bottom:4px">⚠ Esta acción es irreversible</p>
      <p style="font-size:12px;color:var(--danger-text)">¿Borrar el lote <strong>${lote.codigo}</strong>?</p>
    </div>`,
    null,
    async function(){
      const tabla=nivel==='mp'?'lotes_mp':nivel==='be'?'lotes_be':nivel==='pt'?'lotes_pt':'lotes_ep';
      await sbBorrarLote(tabla,lote.codigo);
      registrarAuditoria('BORRADO',tabla,lote.codigo,'Borrado: '+(lote.subinsumo||lote.producto||lote.codigo));
      if(nivel==='mp')lotesMP.splice(idx,1);
      else if(nivel==='be')lotesBE.splice(idx,1);
      else if(nivel==='pt')lotesPT.splice(idx,1);
      else lotesEP.splice(idx,1);
      guardarLocal();cerrarModalCfg();renderTab(tabActual);
    }
  );
  setTimeout(()=>{
    const s=document.getElementById('modal-cfg-save'),d=document.getElementById('modal-cfg-del');
    if(s)s.style.display='none';
    if(d){d.style.display='inline-flex';d.textContent='Sí, borrar';}
  },50);
}

        <span class="badge badge-ok">${n} lotes</span>
      </div>`).join('')}
    </div>
    <p style="font-size:12px;color:var(--text-muted)">Puedes consultar el historial desde <strong>⚙ Configuración → Historial</strong>.</p>`,
    null,
    async function(){await ejecutarCorte(semana);}
  );
  setTimeout(()=>{
    const s=document.getElementById('modal-cfg-save'),d=document.getElementById('modal-cfg-del');
    if(s)s.style.display='none';
    if(d){d.style.display='inline-flex';d.textContent='Hacer corte';}
  },50);
}
async function ejecutarCorte(semana){
  const codigos=[];
  // Archivar localmente
  lotesMP.forEach(l=>{if(!l.archivado&&kgDisponible(l)<=0){l.archivado=true;l.semana_corte=semana;codigos.push({tabla:'lotes_mp',codigo:l.codigo});}});
  lotesBE.forEach(l=>{if(!l.archivado&&bolsaUsada(l.codigo)){l.archivado=true;l.semana_corte=semana;codigos.push({tabla:'lotes_be',codigo:l.codigo});}});
  lotesPT.forEach(l=>{if(!l.archivado){const d=new Date(l.fecha);const hoy=new Date();if((hoy-d)>7*24*3600000){l.archivado=true;l.semana_corte=semana;codigos.push({tabla:'lotes_pt',codigo:l.codigo});}}});
  guardarLocal();
  // Archivar en Supabase
  for(const{tabla,codigo}of codigos){
    await sbFetch(tabla+'?codigo=eq.'+encodeURIComponent(codigo),'PATCH',{archivado:true,semana_corte:semana}).catch(e=>console.warn('Corte error:',e.message));
  }
  registrarAuditoria('CORTE','sistema',semana,'Corte semanal: '+codigos.length+' lotes archivados');
  cerrarModalCfg();
  renderTab(tabActual);
  alert('Corte completado. Se archivaron '+codigos.length+' lotes.');
}

async function cargarAuditoria(){
  const c=document.getElementById('aud-resultado');if(!c)return;
  c.innerHTML='<div class="empty">Cargando...</div>';
  const desde=v('aud-desde'),hasta=v('aud-hasta'),usuario=v('aud-usuario'),accion=v('aud-accion'),modulo=v('aud-modulo');
  let query='order=created_at.desc&limit=300';
  if(desde)query+='&created_at=gte.'+desde+'T00:00:00';
  if(hasta)query+='&created_at=lte.'+hasta+'T23:59:59';
  if(usuario)query+='&usuario=eq.'+encodeURIComponent(usuario);
  if(accion)query+='&accion=eq.'+accion;
  if(modulo)query+='&modulo=eq.'+modulo;
  try{
    const rows=await sbFetch('auditoria','GET',null,query);
    if(!rows||!rows.length){c.innerHTML='<div class="empty">Sin registros en ese rango.</div>';return;}
    const clases={REGISTRO:'badge-ok',BORRADO:'badge-empty',EDICION:'badge-warn',CONFIG:'badge-warn',CORTE:'badge-warn',LOGIN:'',LOGOUT:''};
    c.innerHTML='<table class="htable"><thead><tr><th>Fecha/Hora</th><th>Usuario</th><th>Módulo</th><th>Acción</th><th>Código</th><th>Detalle</th></tr></thead><tbody>'
      +rows.map(r=>{
        const fecha=new Date(r.created_at).toLocaleString('es-MX',{dateStyle:'short',timeStyle:'short'});
        const modCfg=MODULOS_CONFIG[r.modulo];
        return`<tr>
          <td style="font-size:11px;white-space:nowrap">${fecha}</td>
          <td class="mono" style="font-size:11px">${r.usuario}</td>
          <td style="font-size:11px">${modCfg?modCfg.label:r.modulo||'—'}</td>
          <td><span class="badge ${clases[r.accion]||''}">${r.accion||''}</span></td>
          <td class="mono" style="font-size:10px">${r.codigo||'—'}</td>
          <td style="font-size:11px;color:var(--text-muted)">${r.detalle||''}</td>
        </tr>`;
      }).join('')+'</tbody></table>'
      +'<p style="font-size:11px;color:var(--text-muted);margin-top:8px">'+rows.length+' registros</p>';
  }catch(e){c.innerHTML='<div class="empty">Error: '+e.message+'</div>';}
}

// ── MODAL CFG ─────────────────────────────────────────────
function abrirModalCfg(titulo,bodyHTML,onSave,onDelete){
  document.getElementById('modal-cfg-title').textContent=titulo;
  document.getElementById('modal-cfg-body').innerHTML=bodyHTML;
  const btnSave=document.getElementById('modal-cfg-save');
  const btnDel=document.getElementById('modal-cfg-del');
  const conf=document.getElementById('modal-cfg-confirm');
  if(conf)conf.style.display='none';
  if(btnSave){btnSave.style.display=onSave?'inline-flex':'none';if(onSave)btnSave.onclick=onSave;}
  if(btnDel){
    if(onDelete){
      btnDel.style.display='inline-flex';btnDel.textContent='Eliminar';btnDel.style.background='';
      btnDel.onclick=()=>{
        if(conf){
          conf.style.display='flex';
          document.getElementById('modal-cfg-confirm-yes').onclick=()=>{onDelete();if(conf)conf.style.display='none';};
          document.getElementById('modal-cfg-confirm-no').onclick=()=>{if(conf)conf.style.display='none';};
        }else{onDelete();}
      };
    }else{btnDel.style.display='none';}
  }
  document.getElementById('modal-cfg').classList.add('open');
}
function cerrarModalCfg(){
  document.getElementById('modal-cfg').classList.remove('open');
  const btnSave=document.getElementById('modal-cfg-save'),btnDel=document.getElementById('modal-cfg-del'),conf=document.getElementById('modal-cfg-confirm');
  if(btnSave){btnSave.style.display='inline-flex';btnSave.textContent='Guardar';}
  if(btnDel){btnDel.style.display='none';btnDel.textContent='Eliminar';btnDel.style.background='';}
  if(conf)conf.style.display='none';
}

// ── ETIQUETA / IMPRESIÓN ───────────────────────────────────
function imprimirEtiqueta(e){
  const row=(l,v)=>`<tr><td style="padding:3px 6px;font-size:11px;color:#555;border-bottom:1px solid #eee">${l}</td><td style="padding:3px 6px;font-size:11px;font-weight:500;border-bottom:1px solid #eee">${v}</td></tr>`;
  let filas='',nivelTxt='';
  const modLbl=MODULOS_CONFIG[e.modulo]?.label||e.modulo||'';
  if(e.nivel===1){
    nivelTxt='MATERIA PRIMA · N1';
    filas=row('Módulo',modLbl)+row('Establecimiento',e.establecimiento)+row('Insumo',e.insumo)+row('Descripción',e.subinsumo||'—')+row('Cantidad',e.kg+' '+(e.unidad||'kg'))+row('Fecha',fl(e.fecha));
  }else if(e.nivel===2){
    nivelTxt='BOLSA ESPECIAS · N2';
    filas=row('Módulo',modLbl)+row('Producto',e.producto)+row('Fecha',fl(e.fecha));
  }else if(e.nivel===3){
    nivelTxt='PRODUCTO TERMINADO · N3';
    filas=row('Módulo',modLbl)+row('Producto',e.producto)+row('Kg producidos',e.kg+' kg')+row('Kg cárnicos',e.kgUsadoMP?e.kgUsadoMP+' kg':'—')+row('Lote cárnico',e.loteMP?.codigo||'—')+row('Bolsa especias',e.loteBE?.codigo||'—')+row('Fecha',fl(e.fecha));
  }else{
    nivelTxt='EMPAQUE · N4';
    filas=row('Módulo',modLbl)+row('Producto',e.producto)+row('Tipo',e.tipoEmpaque==='GRANEL_JH'?'Granel de JH':'Propio')+row('Presentación',e.presentacion||'—')+row('Piezas',e.piezas+' pzas')+row('Destino',e.establecimientoDestino||e.destino)+row('Lote origen',e.loteOrigen)+row('Fecha',fl(e.fecha));
  }
  const doc=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{margin:0;padding:10px;font-family:monospace}h2{font-size:13px;margin:0 0 4px}p{font-size:10px;color:#666;margin:0 0 8px}table{width:100%;border-collapse:collapse}</style></head><body>
    <h2>${nivelTxt}</h2><p>${e.codigo}</p><table>${filas}</table>
    <script>window.onload=()=>{window.print();setTimeout(()=>window.close(),800);}<\/script>
  </body></html>`;
  const win=window.open('','_blank','width=400,height=500');
  if(!win){alert('Permite ventanas emergentes para imprimir');return;}
  win.document.write(doc);win.document.close();
}

function exportarBackup(){
  const data={version:2,fecha:today(),modular:true,
    lotes:{mp:lotesMP,be:lotesBE,pt:lotesPT,ep:lotesEP},consec,
    catalogos:JSON.parse(localStorage.getItem(CFG_KEY)||'{}'),
    stockMinimos:{},presentaciones:JSON.parse(localStorage.getItem('loteo_presentaciones')||'{}')
  };
  Object.entries(SUBINSUMOS).forEach(([ins,lista])=>{
    (lista||[]).forEach(s=>{const n=s.nombre||s,v=getMinStock(n);if(v>0)data.stockMinimos[n]=v;});
  });
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='backup_loteo_modular_'+today().replace(/-/g,'')+'.json';a.click();
}
function importarBackup(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=function(e){
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.version||!data.lotes){alert('Archivo no válido.');return;}
        abrirModalCfg(
          'Restaurar backup',
          `<div style="background:var(--warn-bg);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px">
            <p style="font-size:13px;color:var(--warn-text);font-weight:500;margin-bottom:4px">⚠ Se reemplazarán los datos actuales</p>
            <p style="font-size:12px;color:var(--warn-text)">Backup del <strong>${data.fecha}</strong></p>
          </div>
          <div style="font-size:13px;line-height:2">
            <div>• N1: <strong>${(data.lotes.mp||[]).length}</strong> lotes</div>
            <div>• N2: <strong>${(data.lotes.be||[]).length}</strong> lotes</div>
            <div>• N3: <strong>${(data.lotes.pt||[]).length}</strong> lotes</div>
            <div>• N4: <strong>${(data.lotes.ep||[]).length}</strong> lotes</div>
          </div>`,
          null,
          function(){
            lotesMP=data.lotes.mp||[];lotesBE=data.lotes.be||[];
            lotesPT=data.lotes.pt||[];lotesEP=data.lotes.ep||[];
            consec=data.consec||{};
            if(data.catalogos&&Object.keys(data.catalogos).length){localStorage.setItem(CFG_KEY,JSON.stringify(data.catalogos));cargarLocal();}
            if(data.presentaciones)localStorage.setItem('loteo_presentaciones',JSON.stringify(data.presentaciones));
            if(data.stockMinimos)Object.entries(data.stockMinimos).forEach(([n,v])=>localStorage.setItem('minstock_'+n,v));
            guardarLocal();cerrarModalCfg();
            renderTab(tabActual);
            alert('Backup restaurado correctamente.');
          }
        );
        setTimeout(()=>{const s=document.getElementById('modal-cfg-save'),d=document.getElementById('modal-cfg-del');if(s)s.style.display='none';if(d){d.style.display='inline-flex';d.textContent='Sí, restaurar';}},50);
      }catch(err){alert('Error: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}

    const tbody=tbl.querySelector('tbody');

      </div>

async function guardarUsuario(u){
  const usuario=(document.getElementById('usr-usuario')?.value||'').trim();
  const nombre=(document.getElementById('usr-nombre')?.value||'').trim();
  const rol=document.getElementById('usr-rol')?.value||'capturista';
  const estab=document.getElementById('usr-estab')?.value||null;
  const pass=document.getElementById('usr-pass')?.value||'';
  const moduSel=[...document.querySelectorAll('#usr-modulos option:checked')].map(o=>o.value);
  const permCbs=document.querySelectorAll('.usr-perm-cb:checked');
  const permisos=permCbs.length?[...permCbs].map(cb=>cb.dataset.perm):null;
  if(!usuario||!nombre){alert('Usuario y nombre son obligatorios.');return;}
  if(!u&&!pass){alert('La contraseña es obligatoria.');return;}
  const data={usuario,nombre,rol,establecimiento:estab||null,modulos:moduSel,permisos,activo:true};
  if(pass)data.password_hash=btoa(pass);
  try{
    if(u){await sbFetch('usuarios?id=eq.'+u.id,'PATCH',data);}
    else{await sbFetch('usuarios','POST',data,'',true);}
    cerrarModalCfg();cargarUsuarios();
  }catch(e){alert('Error: '+e.message);}
}
async function toggleUsuario(u){
  try{await sbFetch('usuarios?id=eq.'+u.id,'PATCH',{activo:!u.activo});cargarUsuarios();}
  catch(e){alert('Error: '+e.message);}
}
async function eliminarUsuario(u){
  if(u.usuario==='admin'){alert('No se puede eliminar al administrador principal.');return;}
  try{await sbFetch('usuarios?id=eq.'+u.id,'DELETE');cerrarModalCfg();cargarUsuarios();}
  catch(e){alert('Error: '+e.message);}
}

// ── RENDER MÓDULO ALMACÉN ─────────────────────────────────
function renderAlmacenTab(tab){
  var el=document.getElementById('app-main');
  if(!el) return;
  if(tab==='alm_resumen')  { el.innerHTML=renderAlmResumen();    return; }
  if(tab==='alm_despacho') { el.innerHTML=renderAlmDespacho();   attachAlmDespachoEvents(); return; }
  if(tab==='alm_historial'){ el.innerHTML=renderAlmHistorial();  return; }
  if(tab==='alm_rutas')    { el.innerHTML=renderAlmRutas();      attachAlmRutasEvents(); return; }
  if(tab==='alm_retiro')   { el.innerHTML=renderAlmRetiro();     attachAlmRetiroEvents(); return; }
  if(tab&&tab.startsWith('alm_'))return void(renderAlmacenTab(tab));
  el.innerHTML='<div class="card"><div class="empty">Seccion en construccion</div></div>';
}

function renderAlmResumen(){
  var hoy=today();
  var despHoy=lotesDespachos.filter(function(d){return d.fecha===hoy;});
  var pzasHoy=despHoy.reduce(function(s,d){return s+(d.piezas||0);},0);
  var kgHoy=despHoy.reduce(function(s,d){return s+(d.kg_granel||0);},0);
  // Inventario disponible en almacén = lotes EP no despachados
  var epDisp=lotesEP.filter(function(l){return!l.archivado&&!loteDespachado(l.codigo);});
  var html='<div class="mod-resumen bh-emp">'

async function registrarDespacho(){
  var rutaId=document.getElementById('alm-ruta')&&document.getElementById('alm-ruta').value;
  var fecha=document.getElementById('alm-fecha')&&document.getElementById('alm-fecha').value;
  var responsable=(document.getElementById('alm-responsable')&&document.getElementById('alm-responsable').value||'').trim();
  var cbs=[...document.querySelectorAll('.alm-lote-cb:checked')];
  var granelDesc=(document.getElementById('alm-granel-desc')&&document.getElementById('alm-granel-desc').value||'').trim();
  var granelKg=parseFloat(document.getElementById('alm-granel-kg')&&document.getElementById('alm-granel-kg').value||'0');

  if(!rutaId){alert('Selecciona una ruta.');return;}
  if(!fecha){alert('Ingresa la fecha.');return;}
  if(cbs.length===0&&!granelKg){alert('Selecciona al menos un lote o ingresa granel.');return;}

  var ruta=rutasReparto.find(function(r){return r.id===rutaId;});
  var lotesSelec=cbs.map(function(cb){
    var l=lotesEP.find(function(x){return x.codigo===cb.dataset.codigo;});
    return{codigo:cb.dataset.codigo,piezas:parseInt(cb.dataset.piezas||0),
      producto:l&&l.producto||'',presentacion:l&&l.presentacion||''};
  });
  var totalPzas=lotesSelec.reduce(function(s,l){return s+(l.piezas||0);},0);
  var id='DSP-'+fc(fecha)+'-'+pad((lotesDespachos.length||0)+1);

  var d={id,fecha,ruta_id:rutaId,ruta_nombre:ruta&&ruta.nombre||rutaId,
    responsable:responsable||'—',
    lotes:lotesSelec,piezas:totalPzas,
    granel_desc:granelDesc||null,kg_granel:granelKg||0,
    modulo:'ALMACEN_BH',ts:Date.now()};

  lotesDespachos.unshift(d);
  guardarAlmacen();

  // Guardar en Supabase
  if(sbOnline){
    await sbFetch('despachos','POST',{
      id,fecha,ruta_id:rutaId,ruta_nombre:d.ruta_nombre,
      responsable:d.responsable,lotes:lotesSelec,piezas:totalPzas,
      granel_desc:granelDesc||null,kg_granel:granelKg||0,
      modulo:'ALMACEN_BH',ts:Date.now()
    },'',true).catch(function(e){console.warn('Despacho Supabase:',e.message);});
  }
  registrarAuditoria('REGISTRO','despachos',id,'Despacho a '+d.ruta_nombre+': '+totalPzas+' pzas');
  showFlash('alm','Despacho registrado correctamente.');
  setTimeout(function(){renderAlmacenTab('alm_despacho');},1500);
}

function ejecutarRetiro(tipo){
  var cod=(document.getElementById('retiro-lote-input')&&document.getElementById('retiro-lote-input').value||'').trim().toUpperCase();
  if(!cod){alert('Ingresa el codigo del lote de materia prima.');return;}
  var loteN1=lotesMP.find(function(l){return l.codigo===cod;});
  if(!loteN1){alert('Lote N1 no encontrado: '+cod);return;}

  var inicio=Date.now();

  // 1. Buscar bolsas N2 que usaron este lote
  var bolsasAfect=lotesBE.filter(function(l){
    return(l.lotesUsados||[]).some(function(u){return u.lote===cod;});
  });
  // 2. Buscar PT N3 que usaron esa bolsa o ese cárnico directamente
  var ptAfect=lotesPT.filter(function(l){
    return(l.loteMP&&l.loteMP.codigo===cod)||
      bolsasAfect.some(function(b){return l.loteBE&&l.loteBE.codigo===b.codigo;});
  });
  // 3. Buscar empaques N4 de esos PT
  var epAfect=lotesEP.filter(function(l){
    return ptAfect.some(function(pt){return l.loteOrigen===pt.codigo;});
  });
  // 4. Buscar despachos que incluyen esos empaques
  var despAfect=lotesDespachos.filter(function(d){
    return(d.lotes||[]).some(function(dl){
      return epAfect.some(function(ep){return ep.codigo===dl.codigo;});
    });
  });

  var tiempoMs=Date.now()-inicio;
  var tiempoSeg=(tiempoMs/1000).toFixed(2);

  var resultado={
    tipo, lote_origen:cod, insumo:loteN1.subinsumo, fecha_inicio:new Date().toISOString(),
    tiempo_seg:parseFloat(tiempoSeg),
    bolsas:bolsasAfect.length, pt:ptAfect.length, ep:epAfect.length,
    despachos:despAfect.length,
    rutas:[...new Set(despAfect.map(function(d){return d.ruta_nombre;}))],
    piezas_afectadas:epAfect.reduce(function(s,l){return s+(l.piezas||0);},0),
    datos:{bolsasAfect,ptAfect,epAfect,despAfect}
  };

  renderResultadoRetiro(resultado,loteN1);

  if(tipo==='real'){
    // Confirmar antes de marcar como retirado
    abrirModalCfg('Confirmar retiro real',
      '<div style="background:var(--danger-bg);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px">'
      +'<p style="font-size:13px;color:var(--danger-text);font-weight:600;margin-bottom:4px">Esta accion marca los lotes como RETIRADOS</p>'
      +'<p style="font-size:12px;color:var(--danger-text)">Se afectaran '+epAfect.length+' lotes de empaque y '+despAfect.length+' despachos.</p>'
      +'</div>'
      +'<div class="form-group"><label>Motivo del retiro</label>'
      +'<input id="retiro-motivo" placeholder="ej: Contaminacion detectada en insumo"/></div>',
      null,
      function(){
        var motivo=(document.getElementById('retiro-motivo')&&document.getElementById('retiro-motivo').value||'').trim();
        if(!motivo){alert('Ingresa el motivo del retiro.');return;}
        ejecutarRetiroReal(resultado,motivo);
        cerrarModalCfg();
      }
    );
    setTimeout(function(){
      var s=document.getElementById('modal-cfg-save');
      var d=document.getElementById('modal-cfg-del');
      if(s)s.style.display='none';

  }
}

async function ejecutarRetiroReal(r,motivo){
  var d=r.datos;
  // Marcar lotes EP como retirados
  d.epAfect.forEach(function(ep){
    var l=lotesEP.find(function(x){return x.codigo===ep.codigo;});
    if(l){l.retirado=true;l.motivo_retiro=motivo;l.fecha_retiro=today();}
  });
  // Marcar despachos como retirados
  d.despAfect.forEach(function(desp){
    var x=lotesDespachos.find(function(y){return y.id===desp.id;});
    if(x){x.retiro=true;x.motivo_retiro=motivo;x.fecha_retiro=today();}
  });
  guardarLocal();guardarAlmacen();
  registrarAuditoria('BORRADO','retiro',r.lote_origen,
    'Retiro real: '+r.ep+' empaques, '+r.despachos+' despachos. Motivo: '+motivo);
  // Generar PDF automáticamente
  generarPDFRetiro(r,motivo);
}

function renderHistorialRetiros(){
  var retiros=lotesDespachos.filter(function(d){return d.retiro;});
  if(!retiros.length)return'<div class="empty">Sin retiros registrados</div>';
  return'<table class="htable"><thead><tr><th>Fecha</th><th>Ruta</th><th>Motivo</th></tr></thead><tbody>'
    +retiros.map(function(d){return'<tr>'
      +'<td style="font-size:12px">'+fl(d.fecha_retiro||d.fecha)+'</td>'
      +'<td style="font-size:12px">'+d.ruta_nombre+'</td>'
      +'<td style="font-size:12px;color:var(--text-muted)">'+( d.motivo_retiro||'—')+'</td>'
      +'</tr>';}).join('')+'</tbody></table>';
}

    +'td{padding:5px 8px;border-bottom:1px solid #eee;font-size:11px}'
    +'.alerta{background:#FDECEB;border-left:4px solid #C0392B;padding:10px 14px;margin:12px 0}'
    +'.firma{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-top:40px}'
    +'.firma-linea{border-top:1px solid #999;padding-top:6px;text-align:center;font-size:11px;color:#666}'
    +'</style></head><body>'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'
    +'<div><h1>AVISO DE RETIRO DE PRODUCTO</h1>'
    +'<p style="margin:4px 0;color:#666">Folio: RET-'+fc(today())+'-'+r.lote_origen.replace(/[^A-Z0-9]/g,'')+'</p>'
    +'<p style="margin:4px 0;color:#666">Fecha de emision: '+now+'</p></div>'
    +'<div style="text-align:right;font-size:11px;color:#999">Generado por Sistema de Loteo</div>'
    +'</div>'
    +'<div class="alerta">'
    +'<strong style="color:#C0392B">MOTIVO DEL RETIRO:</strong> '+motivo+'<br/>'
    +'<strong>Lote de origen:</strong> '+r.lote_origen+' — '+r.insumo
    +'</div>'
    +'<h2>IMPACTO</h2>'
    +'<table><tr><th>Indicador</th><th>Cantidad</th></tr>'
    +'<tr><td>Bolsas de especias afectadas (N2)</td><td>'+r.bolsas+'</td></tr>'
    +'<tr><td>Lotes de producto terminado afectados (N3)</td><td>'+r.pt+'</td></tr>'
    +'<tr><td>Lotes de empaque afectados (N4)</td><td>'+r.ep+'</td></tr>'
    +'<tr><td>Piezas totales afectadas</td><td><strong>'+r.piezas_afectadas+'</strong></td></tr>'
    +'<tr><td>Rutas con producto afectado</td><td>'+( r.rutas.join(', ')||'Ninguna — producto en almacen')+'</td></tr>'
    +'</table>'
    +'<h2>LOTES DE EMPAQUE AFECTADOS</h2>'
    +'<table><tr><th>Codigo</th><th>Producto</th><th>Presentacion</th><th>Piezas</th><th>Destino</th></tr>'
    +d.epAfect.map(function(l){
      var desp=lotesDespachos.find(function(x){return(x.lotes||[]).some(function(dl){return dl.codigo===l.codigo;});});
      return'<tr><td>'+l.codigo+'</td><td>'+l.producto+'</td><td>'+l.presentacion+'</td>'
        +'<td>'+l.piezas+'</td><td>'+(desp?desp.ruta_nombre:'En almacen')+'</td></tr>';
    }).join('')+'</table>'
    +(d.despAfect.length?'<h2>DESPACHOS A RUTAS AFECTADOS</h2>'
      +'<table><tr><th>ID Despacho</th><th>Ruta</th><th>Fecha</th><th>Responsable</th><th>Piezas</th></tr>'
      +d.despAfect.map(function(x){
        return'<tr><td>'+x.id+'</td><td>'+x.ruta_nombre+'</td><td>'+fl(x.fecha)+'</td>'
          +'<td>'+x.responsable+'</td><td>'+x.piezas+'</td></tr>';
      }).join('')+'</table>':'')
    +'<h2>ACCIONES REQUERIDAS</h2>'
    +'<ol style="line-height:2">'
    +(r.rutas.length?r.rutas.map(function(ruta){return'<li>Contactar al responsable de <strong>'+ruta+'</strong> para recuperar producto</li>';}).join(''):'')
    +'<li>Aislar fisicamente los lotes afectados en almacen</li>'
    +'<li>Documentar cantidades recuperadas</li>'
    +'<li>Notificar a COFEPRIS si aplica</li>'
